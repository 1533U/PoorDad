<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PoorDad{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <nav class="app-nav">
      <a href="/" class="app-brand">PoorDad</a>
      <a href="/products">Browse</a>
      <a href="/cart">Cart{% if cart_count|default(0) > 0 %} ({{ cart_count }}){% endif %}</a>
      <div class="app-nav-user">
        {% if user %}
          <a href="/orders">My orders</a>
          <a href="/products/my">My products</a>
          <a href="/products/new">Add product</a>
          <span>{{ user.name }}</span>
          <a href="/auth/logout">Logout</a>
        {% else %}
          <a href="/auth/login">Login</a>
          <a href="/auth/register">Register</a>
        {% endif %}
      </div>
    </nav>
    <div class="app-container">
      {% if flash_message %}
        <div class="flash {{ flash_class or '' }}">{{ flash_message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </body>
</html>
